<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Científica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#8494FF;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:#C9BEFF;
    padding:20px;
    border-radius:20px;
    width:350px;
    box-shadow:0 0 900px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#792CA2;
    margin-bottom:15px;
}

#display{
    width:100%;
    height:60px;
    font-size:24px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    background:#8494FF;
    color:white;
}

.botoes{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.numero{
    background:#9FA1FF;
    color:white;
}

.operador{
    background:#0f99e4;
    color:white;
}

.especial{
    background:#7c3aed;
    color:white;
}

.igual{
    background:#3f964f;
    color:white;
}

.limpar{
    background:#b80e0e;
    color:white;
}
</style>
</head>
<body>

<div class="calculadora">
    <h1>Calculadora</h1>

    <input type="text" id="display" readonly>

    <div class="botoes">
        <button class="limpar" onclick="limpar()">C</button>
        <button class="especial" onclick="adicionar('sqrt')">√</button>
        <button class="especial" onclick="adicionar('log')">log</button>
        <button class="operador" onclick="adicionar('/')">÷</button>

        <button class="numero" onclick="adicionar('7')">7</button>
        <button class="numero" onclick="adicionar('8')">8</button>
        <button class="numero" onclick="adicionar('9')">9</button>
        <button class="operador" onclick="adicionar('*')">×</button>

        <button class="numero" onclick="adicionar('4')">4</button>
        <button class="numero" onclick="adicionar('5')">5</button>
        <button class="numero" onclick="adicionar('6')">6</button>
        <button class="operador" onclick="adicionar('-')">−</button>

        <button class="numero" onclick="adicionar('1')">1</button>
        <button class="numero" onclick="adicionar('2')">2</button>
        <button class="numero" onclick="adicionar('3')">3</button>
        <button class="operador" onclick="adicionar('+')">+</button>

        <button class="numero" onclick="adicionar('0')">0</button>
        <button class="numero" onclick="adicionar('.')">.</button>
        <button class="especial" onclick="adicionar('%')">%</button>
        <button class="igual" onclick="calcular()">=</button>

        <button class="especial" onclick="adicionar('^')">xʸ</button>
        <button class="especial" onclick="adicionar('(')">(</button>
        <button class="especial" onclick="adicionar(')')">)</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function adicionar(valor){
    display.value += valor;
}

function limpar(){
    display.value = "";
}

function calcular(){
    try{
        display.value = math.evaluate(display.value);
    }catch(error){
        display.value = "Erro";
    }
}

document.addEventListener("keydown", (e)=>{
    if(
        "0123456789+-*/.^()%".includes(e.key)
    ){
        display.value += e.key;
    }

    if(e.key === "Enter"){
        calcular();
    }

    if(e.key === "Backspace"){
        display.value = display.value.slice(0,-1);
    }

    if(e.key === "Escape"){
        limpar();
    }
});
</script>

</body>
</html>
